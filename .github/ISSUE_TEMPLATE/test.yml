name: Generate Tests
description: Run Agent 3 — pytest suite + coverage score
labels: ["test"]
body:
  - type: textarea
    id: source_file
    attributes:
      label: Source code
      description: Paste the code to test
      render: python
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - coverage (full pytest suite)
        - validation (targeted falsification tests)
    validations:
      required: true
